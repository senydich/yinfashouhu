<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色权限控制</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        body { font-family: Arial, "Microsoft YaHei", sans-serif; background: #f8fafc; padding: 16px 20px; color: #1e293b; overflow-y: auto; }
        .page-header { margin-bottom: 16px; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; color: #0f2b45; display: flex; align-items: center; gap: 8px; }
        .page-header h1 i { color: #2563eb; font-size: 1.4rem; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 3px 12px -4px rgba(0,0,0,.04); padding: 20px; border: 1px solid #e9eef2; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .card-header h2 { font-size: 1.05rem; font-weight: 600; color: #1e3a5f; }
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-primary, .btn-secondary { border: none; font-weight: 500; padding: 6px 18px; border-radius: 32px; display: inline-flex; align-items: center; gap: 6px; font-size: .8rem; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1a4fbc; }
        .btn-secondary { background: #f1f5f9; color: #334e68; border: 1px solid #e2e8f0; }
        .btn-secondary:hover { background: #e6edf5; }
        .btn-icon { background: none; border: none; font-size: .9rem; color: #5f7d9c; margin: 0 4px; cursor: pointer; }
        .btn-icon:hover { color: #2563eb; }
        .btn-icon.danger:hover { color: #b33a3a; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 180px; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 32px; font-size: .8rem; outline: none; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: .8rem; min-width: 900px; }
        th { text-align: left; padding: 10px 12px; color: #2b4f6e; font-weight: 600; background: #f8fafc; border-bottom: 1px solid #dee7ef; white-space: nowrap; }
        td { padding: 8px 12px; border-bottom: 1px solid #ecf1f5; color: #1e3b4f; white-space: nowrap; }
        .remark-cell { max-width: 260px; overflow: hidden; text-overflow: ellipsis; }
        .badge { padding: 3px 10px; border-radius: 24px; font-size: .7rem; font-weight: 500; display: inline-block; }
        .badge-success { background: #dff0e6; color: #1b6b4a; }
        .badge-danger { background: #fce4e4; color: #b33a3a; }
        .stats-info { margin-top: 12px; color: #64748b; font-size: .75rem; display: flex; align-items: center; gap: 8px; }
    </style>
    <link rel="stylesheet" href="/css/ui-polish.css">
</head>
<body>
<div class="page-header">
    <h1><i class="fas fa-lock"></i> 角色权限控制</h1>
</div>

<div class="card">
    <div class="card-header">
        <h2><i class="fas fa-user-shield"></i> 角色列表</h2>
        <div class="header-actions">
            <a href="/permission/permissionList" class="btn-secondary"><i class="fas fa-key"></i> 权限资源</a>
            <a href="/role/addView" class="btn-primary"><i class="fas fa-plus"></i> 新增角色</a>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" placeholder="搜索角色编码、角色名称..." id="searchInput">
        <button class="btn-primary" style="padding: 6px 16px;" onclick="queryRoles()">
            <i class="fas fa-search"></i> 搜索
        </button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>角色编码</th>
                <th>角色名称</th>
                <th>排序</th>
                <th>状态</th>
                <th>备注</th>
                <th>创建时间</th>
                <th>修改时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="role : ${roleList}">
                <td th:text="${role.id}">1</td>
                <td><strong th:text="${role.roleCode}">admin</strong></td>
                <td th:text="${role.roleName}">系统管理员</td>
                <td th:text="${role.sortNo}">0</td>
                <td>
                    <span class="badge" th:classappend="${role.status == 1 ? ' badge-success' : ' badge-danger'}"
                          th:text="${role.status == 1 ? '启用' : '停用'}">启用</span>
                </td>
                <td class="remark-cell" th:text="${role.remark}" th:title="${role.remark}">备注</td>
                <td th:text="${role.createDate != null ? #dates.format(role.createDate, 'yyyy-MM-dd HH:mm') : ''}">2026-01-01</td>
                <td th:text="${role.updateDate != null ? #dates.format(role.updateDate, 'yyyy-MM-dd HH:mm') : ''}">2026-01-01</td>
                <td>
                    <i class="fas fa-edit btn-icon" th:onclick="|updateRole(${role.id})|"></i>
                    <i class="fas fa-trash-alt btn-icon danger" th:onclick="|delRole(${role.id})|"></i>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="stats-info">
        <i class="fas fa-info-circle"></i>
        <span>共 <span th:text="${roleList == null ? 0 : roleList.size()}">0</span> 个角色</span>
    </div>
</div>

<script>
    window.parent.postMessage({ type: 'pageLoaded', page: 'rolePerm' }, '*');

    function updateRole(id) {
        window.location.href = '/role/updateView?id=' + id;
    }

    function delRole(id) {
        if (confirm('确认删除这个角色？删除后会同步解除用户角色和角色权限关系。')) {
            window.location.href = '/role/del?id=' + id;
        }
    }

    function queryRoles() {
        const keyword = document.getElementById('searchInput').value;
        window.location.href = '/role/roleList?roleCode=' + encodeURIComponent(keyword)
            + '&roleName=' + encodeURIComponent(keyword);
    }
</script>
<script>
    (function() {
        function applyAccentTheme(accent) {
            document.body.dataset.accent = accent || localStorage.getItem('accentTheme') || 'blue';
        }
        applyAccentTheme();
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'accentApply') {
                applyAccentTheme(event.data.accent);
            }
        });
    })();
</script></body>
</html>
