<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陪伴记录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, "Microsoft YaHei", sans-serif; background: #f8fafc; padding: 16px 20px; color: #1e293b; overflow-y: auto; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; color: #0f2b45; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .card { background: #fff; border: 1px solid #e9eef2; border-radius: 16px; padding: 20px; box-shadow: 0 3px 12px -4px rgba(0,0,0,.04); }
        .card-header { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        .btn-primary { background: #2563eb; border: none; color: #fff; padding: 7px 16px; border-radius: 32px; text-decoration: none; display: inline-flex; gap: 6px; align-items: center; font-size: .8rem; cursor: pointer; }
        .btn-icon { background: none; border: none; color: #5f7d9c; margin: 0 4px; cursor: pointer; }
        .btn-icon:hover { color: #2563eb; }
        .btn-icon.danger:hover { color: #b33a3a; }
        .search-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .input, .select { min-width: 160px; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 32px; font-size: .8rem; }
        table { width: 100%; border-collapse: collapse; min-width: 1180px; font-size: .8rem; }
        th, td { padding: 10px 12px; border-bottom: 1px solid #ecf1f5; white-space: nowrap; text-align: left; }
        th { background: #f8fafc; color: #2b4f6e; }
        .badge { padding: 3px 10px; border-radius: 24px; font-size: .7rem; }
        .stable { background: #dff0e6; color: #1b6b4a; }
        .happy { background: #e6f0ff; color: #1e3a8a; }
        .sad { background: #fce4e4; color: #b33a3a; }
        .anxious { background: #fff3e0; color: #b45309; }
        .text-cell { max-width: 320px; white-space: normal; line-height: 1.5; }
        .stats-info { margin-top: 12px; color: #64748b; font-size: .75rem; }
    </style>
    <link rel="stylesheet" href="/css/ui-polish.css">
</head>
<body>
<div class="page-header"><h1><i class="fas fa-hand-holding-heart"></i> 陪伴记录</h1></div>
<div class="card">
    <div class="card-header">
        <h2><i class="fas fa-list-ul"></i> 记录列表</h2>
        <a class="btn-primary" href="/record/accompanyRecordAddView"><i class="fas fa-plus"></i> 新增记录</a>
    </div>
    <form class="search-bar" action="/record/accompanyRecordList" method="get">
        <input class="input" name="elderName" placeholder="老人姓名">
        <input class="input" name="companion" placeholder="陪伴人员">
        <select class="select" name="accompanyType">
            <option value="">全部类型</option>
            <option value="CHAT">聊天</option>
            <option value="EXERCISE">活动</option>
            <option value="VIDEO">视频通话</option>
        </select>
        <select class="select" name="emotionResult">
            <option value="">全部情绪</option>
            <option value="STABLE">稳定</option>
            <option value="HAPPY">开心</option>
            <option value="SAD">低落</option>
        </select>
        <button class="btn-primary" type="submit"><i class="fas fa-search"></i> 搜索</button>
    </form>
    <table>
        <thead>
        <tr><th>ID</th><th>老人</th><th>类型</th><th>开始时间</th><th>结束时间</th><th>时长</th><th>陪伴人</th><th>内容</th><th>情绪</th><th>备注</th><th>操作</th></tr>
        </thead>
        <tbody>
        <tr th:each="item : ${accompanyRecordList}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.elderName}"></td>
            <td th:text="${item.accompanyType == 'CHAT' ? '聊天' : (item.accompanyType == 'EXERCISE' ? '活动' : '视频通话')}"></td>
            <td th:text="${item.startTime != null ? #dates.format(item.startTime, 'yyyy-MM-dd HH:mm') : ''}"></td>
            <td th:text="${item.endTime != null ? #dates.format(item.endTime, 'yyyy-MM-dd HH:mm') : ''}"></td>
            <td th:text="${item.durationMinutes}"></td>
            <td th:text="${item.companion}"></td>
            <td class="text-cell" th:text="${item.content}"></td>
            <td><span class="badge" th:classappend="${item.emotionResult == 'HAPPY' ? ' happy' : (item.emotionResult == 'SAD' ? ' sad' : ' stable')}" th:text="${item.emotionResult == 'HAPPY' ? '开心' : (item.emotionResult == 'SAD' ? '低落' : '稳定')}"></span></td>
            <td th:text="${item.remark}"></td>
            <td>
                <i class="fas fa-edit btn-icon" th:onclick="|location.href='/record/accompanyRecordUpdateView?id=${item.id}'|"></i>
                <i class="fas fa-trash-alt btn-icon danger" th:onclick="|delAccompany(${item.id})|"></i>
            </td>
        </tr>
        </tbody>
    </table>
    <div class="stats-info">共 <span th:text="${accompanyRecordList == null ? 0 : accompanyRecordList.size()}">0</span> 条陪伴记录</div>
</div>
<script>
    window.parent.postMessage({ type: 'pageLoaded', page: 'accompany' }, '*');
    function delAccompany(id) {
        if (confirm('确认删除这条陪伴记录？')) {
            location.href = '/record/accompanyRecordDel?id=' + id;
        }
    }
</script>
<script>
    (function() {
        function applyAccentTheme(accent) {
            document.body.dataset.accent = accent || localStorage.getItem('accentTheme') || 'blue';
        }
        applyAccentTheme();
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'accentApply') {
                applyAccentTheme(event.data.accent);
            }
        });
    })();
</script></body>
</html>
