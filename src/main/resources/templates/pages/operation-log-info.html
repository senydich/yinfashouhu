<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#25805;&#20316;&#26085;&#24535;</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        body { font-family: Arial, sans-serif; background: #f8fafc; padding: 16px 20px; color: #1e293b; overflow-y: auto; }
        .page-header { margin-bottom: 16px; }
        .page-header h1 { font-size: 1.5rem; font-weight: 500; color: #0f2b45; display: flex; align-items: center; gap: 8px; }
        .page-header h1 i { color: #2563eb; font-size: 1.4rem; }
        .card { background: white; border-radius: 16px; box-shadow: 0 3px 12px -4px rgba(0, 0, 0, 0.04); padding: 20px; border: 1px solid #e9eef2; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .card-header h2 { font-size: 1.05rem; font-weight: 600; color: #1e3a5f; }
        .hint { color: #64748b; font-size: 0.72rem; }
        .btn-primary { background: #2563eb; border: none; color: white; font-weight: 500; padding: 6px 18px; border-radius: 32px; display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; cursor: pointer; text-decoration: none; }
        .btn-danger { background: #fff; border: 1px solid #f3b4b4; color: #b33a3a; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; }
        .btn-danger:hover { background: #fce4e4; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-input { flex: 1; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 32px; font-size: 0.8rem; outline: none; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 980px; }
        th { text-align: left; padding: 10px 12px; color: #2b4f6e; font-weight: 600; background: #f8fafc; border-bottom: 1px solid #dee7ef; white-space: nowrap; }
        td { padding: 8px 12px; border-bottom: 1px solid #ecf1f5; color: #1e3b4f; white-space: nowrap; }
        .content-cell { max-width: 320px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge { padding: 3px 10px; border-radius: 24px; font-size: 0.7rem; font-weight: 500; display: inline-block; }
        .badge-success { background: #dff0e6; color: #1b6b4a; }
        .badge-danger { background: #fce4e4; color: #b33a3a; }
        .stats-info { margin-top: 12px; color: #64748b; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
    </style>
    <link rel="stylesheet" href="/css/ui-polish.css">
</head>
<body>
<div class="page-header">
    <h1><i class="fas fa-history"></i> &#25805;&#20316;&#26085;&#24535;</h1>
</div>

<div class="card">
    <div class="card-header">
        <h2><i class="fas fa-list"></i> &#25805;&#20316;&#26085;&#24535;&#21015;&#34920;</h2>
        <span class="hint">&#26085;&#24535;&#30001;&#31995;&#32479;&#33258;&#21160;&#35760;&#24405;&#65292;&#19981;&#25903;&#25345;&#25163;&#21160;&#26032;&#22686;&#25110;&#32534;&#36753;</span>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" placeholder="&#25628;&#32034;&#25805;&#20316;&#20154;&#12289;&#27169;&#22359;&#12289;&#25805;&#20316;&#31867;&#22411;..." id="searchInput">
        <button class="btn-primary" style="padding: 6px 16px;" onclick="queryOperationLogs()">
            <i class="fas fa-search"></i> &#25628;&#32034;
        </button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>&#25805;&#20316;&#20154;</th>
                <th>&#27169;&#22359;&#21517;&#31216;</th>
                <th>&#25805;&#20316;&#31867;&#22411;</th>
                <th>&#25805;&#20316;&#20869;&#23481;</th>
                <th>IP&#22320;&#22336;</th>
                <th>&#29366;&#24577;</th>
                <th>&#25805;&#20316;&#26102;&#38388;</th>
                <th>&#25805;&#20316;</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log : ${operationLogList}">
                <td th:text="${log.id}">1</td>
                <td><strong th:text="${log.operatorName}">admin</strong></td>
                <td th:text="${log.moduleName}">user</td>
                <td th:text="${log.operationType}">add</td>
                <td class="content-cell" th:text="${log.operationContent}" th:title="${log.operationContent}">add user</td>
                <td th:text="${log.ipAddress}">127.0.0.1</td>
                <td>
                    <span class="badge" th:classappend="${log.status == 1 ? ' badge-success' : ' badge-danger'}" th:text="${log.status == 1 ? '成功' : '失败'}">成功</span>
                </td>
                <td th:text="${log.createDate != null ? #dates.format(log.createDate, 'yyyy-MM-dd HH:mm:ss') : ''}">2026-01-01 10:00:00</td>
                <td>
                    <button type="button" class="btn-danger" th:onclick="|delOperationLog(${log.id})|">
                        <i class="fas fa-trash-alt"></i> &#21024;&#38500;
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="stats-info">
        <i class="fas fa-info-circle"></i>
        <span>&#20849; <span th:text="${operationLogList == null ? 0 : operationLogList.size()}">0</span> &#26465;&#25805;&#20316;&#26085;&#24535;</span>
    </div>
</div>

<script>
    window.parent.postMessage({ type: 'pageLoaded', page: 'operationLog' }, '*');

    function delOperationLog(id) {
        if (confirm('确认删除这条操作日志？')) {
            window.location.href = '/operationLog/del?id=' + id;
        }
    }

    function queryOperationLogs() {
        const keyword = document.getElementById('searchInput').value;
        window.location.href = '/operationLog/operationLogList?operatorName=' + encodeURIComponent(keyword)
            + '&moduleName=' + encodeURIComponent(keyword)
            + '&operationType=' + encodeURIComponent(keyword);
    }
</script>
<script>
    (function() {
        function applyAccentTheme(accent) {
            document.body.dataset.accent = accent || localStorage.getItem('accentTheme') || 'blue';
        }
        applyAccentTheme();
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'accentApply') {
                applyAccentTheme(event.data.accent);
            }
        });
    })();
</script></body>
</html>
