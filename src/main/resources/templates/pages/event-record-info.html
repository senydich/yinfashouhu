<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件列表</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, "Microsoft YaHei", sans-serif; background: #f8fafc; padding: 16px 20px; color: #1e293b; overflow-y: auto; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; color: #0f2b45; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .card { background: #fff; border: 1px solid #e9eef2; border-radius: 12px; padding: 20px; box-shadow: 0 3px 12px -4px rgba(0,0,0,.04); }
        .card-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .card-header h2 { font-size: 1.05rem; color: #1e3a5f; }
        .search-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .input, .select { min-width: 160px; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 32px; font-size: .8rem; background: white; }
        .btn { background: #2563eb; color: #fff; border: none; border-radius: 32px; padding: 7px 16px; cursor: pointer; font-size: .8rem; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
        .btn-secondary { background: #f1f5f9; color: #334e68; border: 1px solid #e2e8f0; }
        .summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
        .summary-item { background: #f8fafc; border: 1px solid #e7edf4; border-radius: 10px; padding: 12px; }
        .summary-item .label { color: #64748b; font-size: .75rem; margin-bottom: 4px; }
        .summary-item .num { color: #0f2b45; font-size: 1.25rem; font-weight: 700; }
        .table-wrapper { overflow-x: auto; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 1080px; font-size: .8rem; }
        th, td { padding: 10px 12px; border-bottom: 1px solid #ecf1f5; white-space: nowrap; text-align: left; }
        th { background: #f8fafc; color: #2b4f6e; font-weight: 600; }
        .text-cell { max-width: 360px; white-space: normal; line-height: 1.5; }
        .badge { padding: 3px 10px; border-radius: 24px; font-size: .7rem; font-weight: 600; display: inline-flex; align-items: center; }
        .type-fall { background: #fee2e2; color: #991b1b; }
        .type-health { background: #fef3c7; color: #92400e; }
        .type-reminder { background: #dbeafe; color: #1d4ed8; }
        .type-dialog { background: #ede9fe; color: #6d28d9; }
        .level-high { color: #b91c1c; font-weight: 700; }
        .level-medium { color: #b45309; font-weight: 700; }
        .level-low { color: #15803d; font-weight: 700; }
        .status-pending { color: #b45309; font-weight: 700; }
        .status-done { color: #15803d; font-weight: 700; }
        .empty { text-align: center; color: #64748b; padding: 28px 0; }
        @media (max-width: 900px) { .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 560px) { .summary { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="/css/ui-polish.css">
</head>
<body>
<div class="page-header">
    <h1><i class="fas fa-list-alt"></i> 事件列表</h1>
</div>

<div class="card">
    <div class="card-header">
        <h2><i class="fas fa-bell"></i> 事件中心</h2>
        <a class="btn btn-secondary" href="/record/eventList"><i class="fas fa-rotate-right"></i> 重置</a>
    </div>

    <div class="summary">
        <div class="summary-item">
            <div class="label">事件总数</div>
            <div class="num" th:text="${eventRecordList == null ? 0 : eventRecordList.size()}">0</div>
        </div>
        <div class="summary-item">
            <div class="label">待处理</div>
            <div class="num" th:text="${eventRecordList == null ? 0 : eventRecordList.?[eventStatus == 'PENDING'].size()}">0</div>
        </div>
        <div class="summary-item">
            <div class="label">高等级</div>
            <div class="num" th:text="${eventRecordList == null ? 0 : eventRecordList.?[eventLevel == 'HIGH'].size()}">0</div>
        </div>
        <div class="summary-item">
            <div class="label">健康异常</div>
            <div class="num" th:text="${eventRecordList == null ? 0 : eventRecordList.?[eventType == 'HEALTH'].size()}">0</div>
        </div>
    </div>

    <form class="search-bar" action="/record/eventList" method="get">
        <input class="input" name="elderName" th:value="${query != null ? query.elderName : ''}" placeholder="老人姓名">
        <select class="select" name="eventType">
            <option value="">全部类型</option>
            <option value="FALL" th:selected="${query != null and query.eventType == 'FALL'}">跌倒告警</option>
            <option value="HEALTH" th:selected="${query != null and query.eventType == 'HEALTH'}">健康异常</option>
            <option value="REMINDER" th:selected="${query != null and query.eventType == 'REMINDER'}">提醒任务</option>
            <option value="DIALOG" th:selected="${query != null and query.eventType == 'DIALOG'}">异常对话</option>
        </select>
        <select class="select" name="eventLevel">
            <option value="">全部等级</option>
            <option value="HIGH" th:selected="${query != null and query.eventLevel == 'HIGH'}">高</option>
            <option value="MEDIUM" th:selected="${query != null and query.eventLevel == 'MEDIUM'}">中</option>
            <option value="LOW" th:selected="${query != null and query.eventLevel == 'LOW'}">低</option>
        </select>
        <select class="select" name="eventStatus">
            <option value="">全部状态</option>
            <option value="PENDING" th:selected="${query != null and query.eventStatus == 'PENDING'}">待处理</option>
            <option value="DONE" th:selected="${query != null and query.eventStatus == 'DONE'}">已处理</option>
        </select>
        <button class="btn" type="submit"><i class="fas fa-search"></i> 搜索</button>
    </form>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>事件编号</th>
                <th>类型</th>
                <th>老人</th>
                <th>时间</th>
                <th>标题</th>
                <th>等级</th>
                <th>状态</th>
                <th>内容</th>
                <th>来源</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${eventRecordList == null or eventRecordList.isEmpty()}">
                <td class="empty" colspan="9">暂无事件数据</td>
            </tr>
            <tr th:each="item : ${eventRecordList}">
                <td th:text="${item.id}">-</td>
                <td>
                    <span class="badge"
                          th:classappend="${item.eventType == 'FALL' ? ' type-fall' : (item.eventType == 'HEALTH' ? ' type-health' : (item.eventType == 'REMINDER' ? ' type-reminder' : ' type-dialog'))}"
                          th:text="${item.eventType == 'FALL' ? '跌倒' : (item.eventType == 'HEALTH' ? '健康' : (item.eventType == 'REMINDER' ? '提醒' : '对话'))}">类型</span>
                </td>
                <td th:text="${item.elderName}">-</td>
                <td th:text="${item.eventTime != null ? #dates.format(item.eventTime, 'yyyy-MM-dd HH:mm') : ''}">-</td>
                <td th:text="${item.eventTitle}">-</td>
                <td th:class="${item.eventLevel == 'HIGH' ? 'level-high' : (item.eventLevel == 'MEDIUM' ? 'level-medium' : 'level-low')}"
                    th:text="${item.eventLevel == 'HIGH' ? '高' : (item.eventLevel == 'MEDIUM' ? '中' : '低')}">-</td>
                <td th:class="${item.eventStatus == 'PENDING' ? 'status-pending' : 'status-done'}"
                    th:text="${item.eventStatus == 'PENDING' ? '待处理' : '已处理'}">-</td>
                <td class="text-cell" th:text="${item.eventContent}">-</td>
                <td><a class="btn btn-secondary" th:href="${item.sourceUrl}"><i class="fas fa-arrow-up-right-from-square"></i> 查看</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    window.parent.postMessage({ type: 'pageLoaded', page: 'eventList' }, '*');
</script>
<script>
    (function() {
        function applyAccentTheme(accent) {
            document.body.dataset.accent = accent || localStorage.getItem('accentTheme') || 'blue';
        }
        applyAccentTheme();
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'accentApply') {
                applyAccentTheme(event.data.accent);
            }
        });
    })();
</script></body>
</html>
