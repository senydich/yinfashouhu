<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体检记录管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, "Microsoft YaHei", sans-serif; background: #f8fafc; padding: 16px 20px; color: #1e293b; overflow-y: auto; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; color: #0f2b45; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .card { background: #fff; border: 1px solid #e9eef2; border-radius: 16px; padding: 20px; box-shadow: 0 3px 12px -4px rgba(0,0,0,.04); }
        .card-header { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        .btn-primary { background: #2563eb; border: none; color: #fff; padding: 7px 16px; border-radius: 32px; text-decoration: none; display: inline-flex; gap: 6px; align-items: center; font-size: .8rem; cursor: pointer; }
        .btn-icon { background: none; border: none; color: #5f7d9c; margin: 0 4px; cursor: pointer; }
        .btn-icon:hover { color: #2563eb; }
        .btn-icon.danger:hover { color: #b33a3a; }
        .search-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .input, .select { min-width: 170px; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 32px; font-size: .8rem; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; font-size: .8rem; }
        th, td { padding: 10px 12px; border-bottom: 1px solid #ecf1f5; white-space: nowrap; text-align: left; }
        th { background: #f8fafc; color: #2b4f6e; }
        .badge { padding: 3px 10px; border-radius: 24px; font-size: .7rem; }
        .low { background: #dff0e6; color: #1b6b4a; }
        .medium { background: #fff3e0; color: #b45309; }
        .high { background: #fce4e4; color: #b33a3a; }
        .stats-info { margin-top: 12px; color: #64748b; font-size: .75rem; }
    </style>
    <link rel="stylesheet" href="/css/ui-polish.css">
</head>
<body>
<div class="page-header"><h1><i class="fas fa-file-medical"></i> 体检记录管理</h1></div>
<div class="card">
    <div class="card-header">
        <h2><i class="fas fa-list-ul"></i> 记录列表</h2>
        <a class="btn-primary" href="/report/checkupRecordAddView"><i class="fas fa-plus"></i> 新增体检记录</a>
    </div>
    <form class="search-bar" action="/report/checkupRecordList" method="get">
        <input class="input" name="elderName" th:value="${query != null ? query.elderName : ''}" placeholder="老人姓名">
        <select class="select" name="checkupType">
            <option value="">全部类型</option>
            <option value="ROUTINE" th:selected="${query != null and query.checkupType == 'ROUTINE'}">常规体检</option>
            <option value="SPECIAL" th:selected="${query != null and query.checkupType == 'SPECIAL'}">专项体检</option>
            <option value="FOLLOW_UP" th:selected="${query != null and query.checkupType == 'FOLLOW_UP'}">复查</option>
        </select>
        <select class="select" name="riskLevel">
            <option value="">全部风险</option>
            <option value="LOW" th:selected="${query != null and query.riskLevel == 'LOW'}">低风险</option>
            <option value="MEDIUM" th:selected="${query != null and query.riskLevel == 'MEDIUM'}">中风险</option>
            <option value="HIGH" th:selected="${query != null and query.riskLevel == 'HIGH'}">高风险</option>
        </select>
        <select class="select" name="status">
            <option value="">全部状态</option>
            <option value="NORMAL" th:selected="${query != null and query.status == 'NORMAL'}">正常</option>
            <option value="ABNORMAL" th:selected="${query != null and query.status == 'ABNORMAL'}">异常</option>
        </select>
        <button class="btn-primary" type="submit"><i class="fas fa-search"></i> 搜索</button>
    </form>
    <table>
        <thead>
        <tr><th>ID</th><th>老人</th><th>日期</th><th>类型</th><th>机构</th><th>摘要</th><th>风险</th><th>建议</th><th>状态</th><th>备注</th><th>操作</th></tr>
        </thead>
        <tbody>
        <tr th:each="item : ${checkupRecordList}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.elderName}"></td>
            <td th:text="${item.checkupDate != null ? #dates.format(item.checkupDate, 'yyyy-MM-dd') : ''}"></td>
            <td th:text="${item.checkupType == 'ROUTINE' ? '常规体检' : (item.checkupType == 'SPECIAL' ? '专项体检' : '复查')}"></td>
            <td th:text="${item.hospitalName}"></td>
            <td th:text="${item.resultSummary}"></td>
            <td><span class="badge" th:classappend="${item.riskLevel == 'HIGH' ? ' high' : (item.riskLevel == 'MEDIUM' ? ' medium' : ' low')}" th:text="${item.riskLevel == 'HIGH' ? '高风险' : (item.riskLevel == 'MEDIUM' ? '中风险' : '低风险')}"></span></td>
            <td th:text="${item.followUpSuggestion}"></td>
            <td th:text="${item.status == 'ABNORMAL' ? '异常' : '正常'}"></td>
            <td th:text="${item.remark}"></td>
            <td>
                <i class="fas fa-edit btn-icon" th:onclick="|location.href='/report/checkupRecordUpdateView?id=${item.id}'|"></i>
                <i class="fas fa-trash-alt btn-icon danger" th:onclick="|delCheckup(${item.id})|"></i>
            </td>
        </tr>
        </tbody>
    </table>
    <div class="stats-info">共<span th:text="${checkupRecordList == null ? 0 : checkupRecordList.size()}">0</span>条体检记录</div>
</div>
<script>
    window.parent.postMessage({ type: 'pageLoaded', page: 'examRecords' }, '*');
    function delCheckup(id) {
        if (confirm('确认删除这条体检记录吗？')) {
            location.href = '/report/checkupRecordDel?id=' + id;
        }
    }
</script>
<script>
    (function() {
        function applyAccentTheme(accent) {
            document.body.dataset.accent = accent || localStorage.getItem('accentTheme') || 'blue';
        }
        applyAccentTheme();
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'accentApply') {
                applyAccentTheme(event.data.accent);
            }
        });
    })();
</script></body>
</html>
