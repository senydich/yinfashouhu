<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限资源管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        body { font-family: Arial, "Microsoft YaHei", sans-serif; background: #f8fafc; padding: 16px 20px; color: #1e293b; overflow-y: auto; }
        .page-header { margin-bottom: 16px; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; color: #0f2b45; display: flex; align-items: center; gap: 8px; }
        .page-header h1 i { color: #2563eb; font-size: 1.4rem; }
        .card { background: white; border-radius: 16px; box-shadow: 0 3px 12px -4px rgba(0,0,0,.04); padding: 20px; border: 1px solid #e9eef2; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .card-header h2 { font-size: 1.05rem; font-weight: 600; color: #1e3a5f; }
        .btn-primary, .btn-secondary { border: none; font-weight: 500; padding: 6px 18px; border-radius: 32px; display: inline-flex; align-items: center; gap: 6px; font-size: .8rem; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-secondary { background: #f1f5f9; color: #334e68; border: 1px solid #e2e8f0; }
        .btn-icon { background: none; border: none; font-size: .9rem; color: #5f7d9c; margin: 0 4px; cursor: pointer; }
        .btn-icon:hover { color: #2563eb; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 180px; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 32px; font-size: .8rem; outline: none; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: .8rem; min-width: 980px; }
        th { text-align: left; padding: 10px 12px; color: #2b4f6e; font-weight: 600; background: #f8fafc; border-bottom: 1px solid #dee7ef; white-space: nowrap; }
        td { padding: 8px 12px; border-bottom: 1px solid #ecf1f5; color: #1e3b4f; white-space: nowrap; }
        .remark-cell { max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
        .badge { padding: 3px 10px; border-radius: 24px; font-size: .7rem; font-weight: 500; display: inline-block; }
        .badge-success { background: #dff0e6; color: #1b6b4a; }
        .badge-danger { background: #fce4e4; color: #b33a3a; }
    </style>
    <link rel="stylesheet" href="/css/ui-polish.css">
</head>
<body>
<div class="page-header">
    <h1><i class="fas fa-key"></i> 权限资源管理</h1>
</div>

<div class="card">
    <div class="card-header">
        <h2><i class="fas fa-list-ul"></i> 权限列表</h2>
        <div>
            <a href="/role/roleList" class="btn-secondary"><i class="fas fa-user-shield"></i> 角色管理</a>
            <a href="/permission/addView" class="btn-primary"><i class="fas fa-plus"></i> 新增权限</a>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" placeholder="搜索权限编码、名称或 URL..." id="searchInput">
        <button class="btn-primary" style="padding: 6px 16px;" onclick="queryPermissions()">
            <i class="fas fa-search"></i> 搜索
        </button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>权限编码</th>
                <th>权限名称</th>
                <th>URL</th>
                <th>类型</th>
                <th>父级ID</th>
                <th>排序</th>
                <th>状态</th>
                <th>备注</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="permission : ${permissionList}">
                <td th:text="${permission.id}">1</td>
                <td th:text="${permission.permCode}">user:list</td>
                <td th:text="${permission.permName}">用户管理</td>
                <td th:text="${permission.permUrl}">/user/userList</td>
                <td th:text="${permission.permType}">PAGE</td>
                <td th:text="${permission.parentId}">0</td>
                <td th:text="${permission.sortNo}">0</td>
                <td>
                    <span class="badge" th:classappend="${permission.status == 1 ? ' badge-success' : ' badge-danger'}"
                          th:text="${permission.status == 1 ? '启用' : '停用'}">启用</span>
                </td>
                <td class="remark-cell" th:text="${permission.remark}" th:title="${permission.remark}">备注</td>
                <td>
                    <i class="fas fa-edit btn-icon" th:onclick="|updatePermission(${permission.id})|"></i>
                    <i class="fas fa-trash-alt btn-icon" th:onclick="|delPermission(${permission.id})|"></i>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    window.parent.postMessage({ type: 'pageLoaded', page: 'permission:list' }, '*');

    function updatePermission(id) {
        window.location.href = '/permission/updateView?id=' + id;
    }

    function delPermission(id) {
        if (confirm('确认删除这个权限吗？')) {
            window.location.href = '/permission/del?id=' + id;
        }
    }

    function queryPermissions() {
        const keyword = document.getElementById('searchInput').value;
        window.location.href = '/permission/permissionList?permCode=' + encodeURIComponent(keyword)
            + '&permName=' + encodeURIComponent(keyword)
            + '&permUrl=' + encodeURIComponent(keyword);
    }
</script>
<script>
    (function() {
        function applyAccentTheme(accent) {
            document.body.dataset.accent = accent || localStorage.getItem('accentTheme') || 'blue';
        }
        applyAccentTheme();
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'accentApply') {
                applyAccentTheme(event.data.accent);
            }
        });
    })();
</script></body>
</html>
