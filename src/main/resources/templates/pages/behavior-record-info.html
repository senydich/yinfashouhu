<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行为记录管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        body { font-family: Arial, "Microsoft YaHei", sans-serif; background: #f8fafc; padding: 16px 20px; color: #1e293b; overflow-y: auto; }
        .page-header { margin-bottom: 16px; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; color: #0f2b45; display: flex; align-items: center; gap: 8px; }
        .page-header h1 i { color: #2563eb; font-size: 1.4rem; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 3px 12px -4px rgba(0,0,0,.04); padding: 20px; border: 1px solid #e9eef2; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .card-header h2 { font-size: 1.05rem; font-weight: 600; color: #1e3a5f; }
        .btn-primary { background: #2563eb; border: none; color: white; font-weight: 500; padding: 6px 18px; border-radius: 32px; display: inline-flex; align-items: center; gap: 6px; font-size: .8rem; cursor: pointer; text-decoration: none; }
        .btn-primary:hover { background: #1a4fbc; }
        .btn-icon { background: none; border: none; font-size: .9rem; color: #5f7d9c; margin: 0 4px; cursor: pointer; }
        .btn-icon:hover { color: #2563eb; }
        .btn-icon.danger:hover { color: #b33a3a; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-input, .search-select { flex: 1; min-width: 160px; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 32px; font-size: .8rem; outline: none; background: #fff; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: .8rem; min-width: 1100px; }
        th { text-align: left; padding: 10px 12px; color: #2b4f6e; font-weight: 600; background: #f8fafc; border-bottom: 1px solid #dee7ef; white-space: nowrap; }
        td { padding: 8px 12px; border-bottom: 1px solid #ecf1f5; color: #1e3b4f; white-space: nowrap; }
        .remark-cell { max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
        .badge { padding: 3px 10px; border-radius: 24px; font-size: .7rem; font-weight: 500; display: inline-block; }
        .badge-low { background: #dff0e6; color: #1b6b4a; }
        .badge-medium { background: #fff3e0; color: #b45309; }
        .badge-high { background: #fce4e4; color: #b33a3a; }
        .stats-info { margin-top: 12px; color: #64748b; font-size: .75rem; display: flex; align-items: center; gap: 8px; }
    </style>
    <link rel="stylesheet" href="/css/ui-polish.css">
</head>
<body>
<div class="page-header">
    <h1><i class="fas fa-database"></i> 行为记录管理</h1>
</div>

<div class="card">
    <div class="card-header">
        <h2><i class="fas fa-list-ul"></i> 行为记录列表</h2>
        <a href="/report/behaviorRecordAddView" class="btn-primary"><i class="fas fa-plus"></i> 新增记录</a>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" placeholder="搜索老人姓名..." id="elderNameInput">
        <select class="search-select" id="behaviorTypeInput">
            <option value="">全部行为类型</option>
            <option value="ACTIVITY">活动</option>
            <option value="SLEEP">睡眠</option>
            <option value="MEDICATION">用药</option>
            <option value="ABNORMAL">异常</option>
        </select>
        <select class="search-select" id="riskLevelInput">
            <option value="">全部风险</option>
            <option value="LOW">低风险</option>
            <option value="MEDIUM">中风险</option>
            <option value="HIGH">高风险</option>
        </select>
        <button class="btn-primary" style="padding: 6px 16px;" onclick="queryRecords()">
            <i class="fas fa-search"></i> 搜索
        </button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>老人</th>
                <th>行为类型</th>
                <th>行为名称</th>
                <th>位置</th>
                <th>开始时间</th>
                <th>结束时间</th>
                <th>持续分钟</th>
                <th>风险</th>
                <th>来源设备</th>
                <th>备注</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="record : ${behaviorRecordList}">
                <td th:text="${record.id}">1</td>
                <td><strong th:text="${record.elderName}">张三</strong></td>
                <td th:text="${record.behaviorType == 'ACTIVITY' ? '活动' : (record.behaviorType == 'SLEEP' ? '睡眠' : (record.behaviorType == 'MEDICATION' ? '用药' : '异常'))}">活动</td>
                <td th:text="${record.behaviorName}">晨间散步</td>
                <td th:text="${record.location}">花园</td>
                <td th:text="${record.startTime != null ? #dates.format(record.startTime, 'yyyy-MM-dd HH:mm') : ''}">2026-06-17 08:00</td>
                <td th:text="${record.endTime != null ? #dates.format(record.endTime, 'yyyy-MM-dd HH:mm') : ''}">2026-06-17 08:30</td>
                <td th:text="${record.durationMinutes}">30</td>
                <td>
                    <span class="badge"
                          th:classappend="${record.riskLevel == 'HIGH' ? ' badge-high' : (record.riskLevel == 'MEDIUM' ? ' badge-medium' : ' badge-low')}"
                          th:text="${record.riskLevel == 'HIGH' ? '高风险' : (record.riskLevel == 'MEDIUM' ? '中风险' : '低风险')}">低风险</span>
                </td>
                <td th:text="${record.sourceDevice}">摄像头</td>
                <td class="remark-cell" th:text="${record.remark}" th:title="${record.remark}">备注</td>
                <td>
                    <i class="fas fa-edit btn-icon" th:onclick="|updateRecord(${record.id})|"></i>
                    <i class="fas fa-trash-alt btn-icon danger" th:onclick="|delRecord(${record.id})|"></i>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="stats-info">
        <i class="fas fa-info-circle"></i>
        <span>共 <span th:text="${behaviorRecordList == null ? 0 : behaviorRecordList.size()}">0</span> 条行为记录</span>
    </div>
</div>

<script>
    window.parent.postMessage({ type: 'pageLoaded', page: 'behaviorMgmt' }, '*');

    function updateRecord(id) {
        window.location.href = '/report/behaviorRecordUpdateView?id=' + id;
    }

    function delRecord(id) {
        if (confirm('确认删除这条行为记录？')) {
            window.location.href = '/report/behaviorRecordDel?id=' + id;
        }
    }

    function queryRecords() {
        const elderName = document.getElementById('elderNameInput').value;
        const behaviorType = document.getElementById('behaviorTypeInput').value;
        const riskLevel = document.getElementById('riskLevelInput').value;
        window.location.href = '/report/behaviorRecordList?elderName=' + encodeURIComponent(elderName)
            + '&behaviorType=' + encodeURIComponent(behaviorType)
            + '&riskLevel=' + encodeURIComponent(riskLevel);
    }
</script>
<script>
    (function() {
        function applyAccentTheme(accent) {
            document.body.dataset.accent = accent || localStorage.getItem('accentTheme') || 'blue';
        }
        applyAccentTheme();
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'accentApply') {
                applyAccentTheme(event.data.accent);
            }
        });
    })();
</script></body>
</html>
