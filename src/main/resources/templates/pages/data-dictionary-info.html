<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#25968;&#25454;&#23383;&#20856;</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        body { font-family: Arial, sans-serif; background: #f8fafc; padding: 16px 20px; color: #1e293b; overflow-y: auto; }
        .page-header { margin-bottom: 16px; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; color: #0f2b45; display: flex; align-items: center; gap: 8px; }
        .page-header h1 i { color: #2563eb; font-size: 1.4rem; }
        .card { background: white; border-radius: 16px; box-shadow: 0 3px 12px -4px rgba(0, 0, 0, 0.04); padding: 20px; border: 1px solid #e9eef2; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .card-header h2 { font-size: 1.05rem; font-weight: 600; color: #1e3a5f; }
        .btn-primary { background: #2563eb; border: none; color: white; font-weight: 500; padding: 6px 18px; border-radius: 32px; display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; cursor: pointer; text-decoration: none; }
        .btn-primary:hover { background: #1a4fbc; }
        .btn-icon { background: none; border: none; font-size: 0.9rem; color: #5f7d9c; margin: 0 4px; cursor: pointer; transition: 0.1s; }
        .btn-icon:hover { color: #2563eb; }
        .btn-icon.danger:hover { color: #b33a3a; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 980px; }
        th { text-align: left; padding: 10px 12px; color: #2b4f6e; font-weight: 600; background: #f8fafc; border-bottom: 1px solid #dee7ef; white-space: nowrap; }
        td { padding: 8px 12px; border-bottom: 1px solid #ecf1f5; color: #1e3b4f; white-space: nowrap; }
        .remark-cell { max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
        .badge { padding: 3px 10px; border-radius: 24px; font-size: 0.7rem; font-weight: 500; display: inline-block; }
        .badge-success { background: #dff0e6; color: #1b6b4a; }
        .badge-danger { background: #fce4e4; color: #b33a3a; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-input { flex: 1; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 32px; font-size: 0.8rem; outline: none; min-width: 180px; }
        .search-input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
        .stats-info { margin-top: 12px; color: #64748b; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
    </style>
    <link rel="stylesheet" href="/css/ui-polish.css">
</head>
<body>
<div class="page-header">
    <h1><i class="fas fa-book"></i> &#25968;&#25454;&#23383;&#20856;</h1>
</div>

<div class="card">
    <div class="card-header">
        <h2><i class="fas fa-list-ul"></i> &#23383;&#20856;&#39033;&#21015;&#34920;</h2>
        <a href="/dictionary/addView" class="btn-primary"><i class="fas fa-plus"></i> &#26032;&#22686;&#23383;&#20856;</a>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" placeholder="&#25628;&#32034;&#23383;&#20856;&#31867;&#22411;&#12289;&#32534;&#30721;&#12289;&#21517;&#31216;..." id="searchInput">
        <button class="btn-primary" style="padding: 6px 16px;" onclick="queryDictionaries()">
            <i class="fas fa-search"></i> &#25628;&#32034;
        </button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>&#23383;&#20856;&#31867;&#22411;</th>
                <th>&#23383;&#20856;&#32534;&#30721;</th>
                <th>&#23383;&#20856;&#21517;&#31216;</th>
                <th>&#23383;&#20856;&#20540;</th>
                <th>&#25490;&#24207;</th>
                <th>&#29366;&#24577;</th>
                <th>&#22791;&#27880;</th>
                <th>&#21019;&#24314;&#26102;&#38388;</th>
                <th>&#20462;&#25913;&#26102;&#38388;</th>
                <th>&#25805;&#20316;</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="dict : ${dictionaryList}">
                <td th:text="${dict.id}">1</td>
                <td><strong th:text="${dict.dictType}">gender</strong></td>
                <td th:text="${dict.dictCode}">male</td>
                <td th:text="${dict.dictName}">&#30007;</td>
                <td th:text="${dict.dictValue}">1</td>
                <td th:text="${dict.sortNo}">0</td>
                <td>
                    <span class="badge" th:classappend="${dict.status == 1 ? ' badge-success' : ' badge-danger'}">
                        <span th:if="${dict.status == 1}">&#21551;&#29992;</span>
                        <span th:if="${dict.status != 1}">&#20572;&#29992;</span>
                    </span>
                </td>
                <td class="remark-cell" th:text="${dict.remark}" th:title="${dict.remark}">&#22791;&#27880;</td>
                <td th:text="${dict.createDate != null ? #dates.format(dict.createDate, 'yyyy-MM-dd HH:mm') : ''}">2026-01-01</td>
                <td th:text="${dict.updateDate != null ? #dates.format(dict.updateDate, 'yyyy-MM-dd HH:mm') : ''}">2026-01-01</td>
                <td>
                    <i class="fas fa-edit btn-icon" th:onclick="|updateDictionary(${dict.id})|"></i>
                    <i class="fas fa-trash-alt btn-icon danger" th:onclick="|delDictionary(${dict.id})|"></i>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="stats-info">
        <i class="fas fa-info-circle"></i>
        <span>&#20849; <span th:text="${dictionaryList == null ? 0 : dictionaryList.size()}">0</span> &#26465;&#23383;&#20856;&#39033;</span>
    </div>
</div>

<script>
    window.parent.postMessage({ type: 'pageLoaded', page: 'dict' }, '*');

    function delDictionary(id) {
        if (confirm('\u786e\u8ba4\u5220\u9664\u8fd9\u6761\u6570\u636e\u5b57\u5178\u5417\uff1f')) {
            window.location.href = '/dictionary/del?id=' + id;
        }
    }

    function updateDictionary(id) {
        window.location.href = '/dictionary/updateView?id=' + id;
    }

    function queryDictionaries() {
        const keyword = document.getElementById('searchInput').value;
        window.location.href = '/dictionary/dictionaryList?dictType=' + encodeURIComponent(keyword)
            + '&dictCode=' + encodeURIComponent(keyword)
            + '&dictName=' + encodeURIComponent(keyword);
    }
</script>
<script>
    (function() {
        function applyAccentTheme(accent) {
            document.body.dataset.accent = accent || localStorage.getItem('accentTheme') || 'blue';
        }
        applyAccentTheme();
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'accentApply') {
                applyAccentTheme(event.data.accent);
            }
        });
    })();
</script></body>
</html>
