<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话记录模块</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, "Microsoft YaHei", sans-serif; background: #f8fafc; padding: 16px 20px; color: #1e293b; overflow-y: auto; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; color: #0f2b45; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .card { background: #fff; border: 1px solid #e9eef2; border-radius: 16px; padding: 20px; box-shadow: 0 3px 12px -4px rgba(0,0,0,.04); }
        .search-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .input, .select { min-width: 180px; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 32px; font-size: .8rem; }
        .btn { background: #2563eb; color: #fff; border: none; border-radius: 32px; padding: 7px 16px; cursor: pointer; font-size: .8rem; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; font-size: .8rem; }
        th, td { padding: 10px 12px; border-bottom: 1px solid #ecf1f5; white-space: nowrap; text-align: left; }
        th { background: #f8fafc; color: #2b4f6e; }
        .bubble { max-width: 320px; white-space: normal; line-height: 1.5; }
    </style>
    <link rel="stylesheet" href="/css/ui-polish.css">
</head>
<body>
<div class="page-header">
    <h1><i class="fas fa-comments"></i> 对话记录模块</h1>
</div>
<div class="card">
    <div class="search-bar">
        <input class="input" type="text" name="elderName" placeholder="按老人姓名搜索" form="searchForm">
        <input class="input" type="text" name="speaker" placeholder="发言人" form="searchForm">
        <select class="select" name="emotion" form="searchForm">
            <option value="">全部情绪</option>
            <option value="NORMAL">正常</option>
            <option value="HAPPY">开心</option>
            <option value="SAD">低落</option>
            <option value="ANXIOUS">焦虑</option>
        </select>
        <button class="btn" form="searchForm" type="submit"><i class="fas fa-search"></i> 搜索</button>
    </div>
    <form id="searchForm" action="/record/dialogRecordList" method="get"></form>
    <table>
        <thead>
        <tr>
            <th>ID</th><th>老人</th><th>时间</th><th>发言人</th><th>对话内容</th><th>情绪</th><th>备注</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${dialogRecordList}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.elderName}"></td>
            <td th:text="${item.dialogTime != null ? #dates.format(item.dialogTime, 'yyyy-MM-dd HH:mm') : ''}"></td>
            <td th:text="${item.speaker}"></td>
            <td class="bubble" th:text="${item.dialogContent}"></td>
            <td th:text="${item.emotion}"></td>
            <td th:text="${item.remark}"></td>
        </tr>
        </tbody>
    </table>
</div>
<script>window.parent.postMessage({ type: 'pageLoaded', page: 'dialog' }, '*');</script>
<script>
    (function() {
        function applyAccentTheme(accent) {
            document.body.dataset.accent = accent || localStorage.getItem('accentTheme') || 'blue';
        }
        applyAccentTheme();
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'accentApply') {
                applyAccentTheme(event.data.accent);
            }
        });
    })();
</script></body>
</html>
